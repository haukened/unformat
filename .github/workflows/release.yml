name: Release

# Trigger on version tags like v1.0.0, v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build & Test
    runs-on: macos-26
    permissions:
      contents: write

    env:
      SCHEME: unformat
      PROJECT: unformat.xcodeproj
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      BUILD_DIR: ${{ github.workspace }}/DerivedData/Build/Products/Release
      # Strip the leading "v" from the tag to get a clean version string
      VERSION: ${{ github.ref_name }}

    steps:
      # Check out the repository
      - name: Checkout
        uses: actions/checkout@v6

      # Select latest stable Xcode shipped on the runner
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # Build the app in Release configuration (unsigned)
      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Create a zip archive of the built .app bundle, labeled with version
      - name: Create zip
        run: |
          cd "$BUILD_DIR"
          ditto -c -k --keepParent unformat.app "unformat-${VERSION#v}-unsigned.zip"

      # Create a GitHub Release with auto-generated notes and attach the zip
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: ${{ env.BUILD_DIR }}/unformat-*-unsigned.zip
